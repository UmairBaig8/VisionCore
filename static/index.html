<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidCore — AI Video Analysis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;display:flex;height:100vh;overflow:hidden}
#sidebar{width:280px;background:#161b22;border-right:1px solid #21262d;padding:16px;overflow-y:auto;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow-y:auto}
h1{font-size:18px;color:#58a6ff;margin-bottom:16px}
h2{font-size:14px;color:#8b949e;margin:12px 0 6px}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s}
.btn-primary{background:#238636;color:#fff}.btn-primary:hover{background:#2ea043}
.btn-danger{background:#da3633;color:#fff}.btn-danger:hover{background:#f85149}
.btn-secondary{background:#21262d;color:#c9d1d9;border:1px solid #30363d}.btn-secondary:hover{background:#30363d}
.btn-sm{padding:4px 10px;font-size:12px}
select,input[type=file]{width:100%;padding:8px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px;margin-bottom:8px}
.video-item{padding:8px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.video-item:hover{background:#21262d}.video-item.active{background:#1f6feb33;border:1px solid #1f6feb}
#scoreboard{display:flex;gap:12px;padding:16px;background:#161b22;border-bottom:1px solid #21262d;flex-wrap:wrap;align-items:center}
.metric{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 16px;text-align:center;min-width:80px}
.metric .label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.metric .value{font-size:18px;font-weight:700;color:#58a6ff;margin-top:2px}
.metric .value.score{font-size:24px;color:#f0883e}
.metric .value.events{color:#3fb950}
.metric .value.phase{color:#d2a8ff;font-size:14px}
#panels{display:flex;flex:1;gap:12px;padding:12px;overflow:hidden}
#player-panel{flex:1;min-width:0}
#ticker-panel{width:380px;flex-shrink:0;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:12px;overflow-y:auto;max-height:calc(100vh - 160px)}
video{width:100%;border-radius:8px;background:#000;max-height:400px}
#events{display:flex;flex-direction:column;gap:6px}
.event{border-left:3px solid #30363d;padding:8px 12px;font-size:12px;background:#0d1117;border-radius:0 6px 6px 0;animation:slideIn .3s ease}
.event.goal{border-color:#3fb950}.event.card{border-color:#f0883e}.event.foul{border-color:#da3633}
.event .ts{color:#58a6ff;font-weight:600;margin-right:8px}
.event .type{font-weight:700}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
#status-bar{padding:8px 16px;background:#161b22;border-top:1px solid #21262d;font-size:12px;color:#8b949e;display:flex;justify-content:space-between}
.progress-bar{width:200px;height:6px;background:#21262d;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#238636;transition:width .3s}
#report-panel{display:none;padding:16px;background:#161b22;border:1px solid #21262d;border-radius:8px;margin:12px;font-size:13px;line-height:1.6;max-height:300px;overflow-y:auto}
#report-panel h1,#report-panel h2,#report-panel h3{color:#58a6ff;margin:8px 0}
#report-panel code{background:#0d1117;padding:2px 6px;border-radius:3px}
.loading{display:inline-block;width:8px;height:8px;background:#58a6ff;border-radius:50%;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.upload-zone{border:2px dashed #30363d;border-radius:8px;padding:20px;text-align:center;cursor:pointer;margin:8px 0}.upload-zone:hover{border-color:#58a6ff}
</style>
</head>
<body>

<div id="sidebar">
  <h1>⚽ VidCore</h1>
  <div class="upload-zone" onclick="document.getElementById('upload-input').click()">
    📤 Drop video or click to upload
    <input type="file" id="upload-input" accept="video/*" style="display:none" onchange="uploadVideo()">
  </div>
  <h2>Available Videos</h2>
  <div id="video-list">Loading...</div>
  <h2>Analysis</h2>
  <select id="depth-select">
    <option value="fast">Fast (scene + events)</option>
    <option value="scene-only">Scene only (fastest)</option>
    <option value="full">Full (scene + event + analysis)</option>
  </select>
  <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="startAnalysis()" id="analyze-btn">
    ▶ Start Analysis
  </button>
  <button class="btn btn-danger btn-sm" style="width:100%;margin-top:4px" onclick="stopAnalysis()">✕ Stop</button>
</div>

<div id="main">
  <div id="scoreboard">
    <div class="metric"><div class="label">Sport</div><div class="value" id="sport-val">--</div></div>
    <div class="metric"><div class="label">Score</div><div class="value score" id="score-val">0-0</div></div>
    <div class="metric"><div class="label">Phase</div><div class="value phase" id="phase-val">--</div></div>
    <div class="metric"><div class="label">Events</div><div class="value events" id="events-val">0</div></div>
    <div class="metric"><div class="label">Location</div><div class="value" id="location-val" style="font-size:12px">--</div></div>
    <div class="metric"><div class="label">Type</div><div class="value" id="type-val" style="font-size:12px">--</div></div>
  </div>

  <div id="panels">
    <div id="player-panel">
      <video id="reel-player" controls autoplay muted loop>
        <source src="" type="video/mp4">
      </video>
      <div style="margin-top:8px;font-size:12px;color:#8b949e" id="reel-label">Select a video and start analysis to see reels</div>
    </div>
    <div id="ticker-panel">
      <div style="font-weight:600;margin-bottom:8px">📡 Live Event Ticker</div>
      <div id="events"><div style="color:#8b949e;font-size:12px">Waiting for events...</div></div>
    </div>
  </div>

  <div id="report-panel"></div>

  <div id="status-bar">
    <span id="status-text">● Ready</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
